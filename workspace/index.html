<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Release Control</title>
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Engineering operations</p>
      <h1>Release Control</h1>
      <p class="intro">A clear view of today’s active deployments.</p>
    </div>
    <div class="system-health"><span></span> Systems operational</div>
  </header>
  <main>
    <section class="summary">
      <div><strong>6</strong><span>Active releases</span></div>
      <div><strong>3</strong><span>Environments</span></div>
      <div><strong>2</strong><span>Deploying now</span></div>
    </section>
    <section class="release-section">
      <div class="toolbar">
        <form id="filter-controls"></form>
        <p id="result-count">6 releases</p>
      </div>
      <div id="release-grid" class="release-grid"></div>
    </section>
  </main>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
